# wharfy.yaml — crofty release config. Unspecified values are inferred by wharfy
# from the git remote and conventions (project=crofty, github=ShiroDoromoto/crofty,
# license from LICENSE, etc).

# Listing channels overrides the default set, so enumerate every owned channel:
# the defaults minus homebrew/scoop, plus apt/rpm, which here mean "build a .deb
# and an .rpm" and nothing more — no repo is configured, so `wharfy publish`
# skips them and the packages ship as release assets.
#
# No homebrew, no scoop. Both existed to be the terminal user's route, and to
# drag Hugo in as a package dependency. install.sh / install.ps1 serve the first
# purpose; the click installers now bundle Hugo, which retires the second. What
# was left was two tap repos to keep. They stay on GitHub, archived, with a
# notice on the last formula: `crofty update` sends anyone still there to the
# installers. Do not re-add these channels — a release would overwrite that
# notice.
channels:
  - releases
  - script
  - goinstall
  - apt
  - rpm

# No `provider:` on purpose. A hosted apt/yum repo would have to be GPG-signed to
# be worth having, and the only host we had (Gemfury) signs by holding our private
# key — a repo nobody asked for, at that price, is not worth keeping. The .deb and
# .rpm on the releases page install the same package; crofty says when a new one
# is out. Hugo stays a SOFT dep on Linux (recommends/suggests, not depends):
# distro Hugo is often outdated or the non-extended build, and crofty prints a
# clear "hugo not found" error if it is missing.
apt:
  recommends:
    - hugo
  suggests:
    - hugo
rpm:
  recommends:
    - hugo
  suggests:
    - hugo
