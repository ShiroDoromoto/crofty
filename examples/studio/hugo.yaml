# Standard Hugo config. crofty reads only its own settings from .crofty/config.json,
# so this file stays plain Hugo — your project is always yours to keep (eject-safe).
baseURL: "https://studio.crofty.site/"
locale: "en"
title: "North Yard Studio"
enableRobotsTXT: true
menu:
  main:
    - { name: Work, url: /work/, weight: 10 }
    - { name: About, url: /about/, weight: 20 }
    - { name: Contact, url: /contact/, weight: 30 }
markup:
  highlight:
    # Class-based colours so code follows the theme's light/dark (the theme
    # ships the stylesheet). Set true for inline styles / a fixed Chroma style.
    noClasses: false
params:
  description: "North Yard Studio — a small design & build studio. Services, selected work, and how to reach us."
  # Tool-specific front matter and params nest under `crofty:` (spec v0).
  crofty:
    specVersion: "0"
