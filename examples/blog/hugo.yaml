# Standard Hugo config. crofty reads only its own settings from .crofty/config.json,
# so this file stays plain Hugo — your project is always yours to keep (eject-safe).
baseURL: "https://demo.crofty.site/"
enableRobotsTXT: true

# Multilingual is opt-in: with a single language this whole block is absent and
# the site behaves exactly as before. Here we add Japanese (English stays at /,
# Japanese at /ja/). Per-site strings a person sets — title, description, menu
# labels — live per language; only what you fill in is shown, the rest falls
# back to the default language. Post text is translated by filename
# (index.md + index.ja.md in the same bundle).
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

pagination:
  pagerSize: 6

# Markdown rendering. This is plain Hugo (crofty injects no markup config), so
# what you set here is what you get. The demo turns on a few things so it can
# show the full range of what a post can contain:
#   - goldmark.renderer.unsafe: pass raw HTML in Markdown through untouched, so
#     "paste this on your site" snippets (gists, CodePen, embeds, <video>) work.
#     It is off by default in Hugo; a single-author site you own is exactly the
#     case where trusting your own HTML is fine.
#   - highlight: class-based syntax highlighting, so code colours follow the
#     reader's light/dark setting via css/extra.css instead of a baked-in theme.
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    lineNos: false
    tabWidth: 2

params:
  # Tool-specific front matter and params nest under `crofty:` (spec v0).
  crofty:
    specVersion: "0"
    # head_raw is the sanctioned slot for extra <head> markup (08 §2): the
    # crofty theme stays frozen, the demo adds its own stylesheet for the rich
    # content below (images, tables, Mermaid, abc.js). Project layouts under
    # layouts/_default/_markup/ supply the Mermaid/abc render hooks.
    head_raw: |
      <link rel="stylesheet" href="/css/extra.css">
      <link rel="stylesheet" href="/css/chroma.css">

languages:
  en:
    languageCode: "en"
    locale: "en"
    label: "EN"
    weight: 1
    title: "An example built with crofty"
    params:
      description: "A live example built with crofty — plain Markdown on a domain its author owns."
    menu:
      main:
        - name: About
          url: /about/
          weight: 10
        - name: Links
          url: /links/
          weight: 20
        - name: Contact
          url: /contact/
          weight: 30
  ja:
    languageCode: "ja"
    locale: "ja"
    label: "日本語"
    weight: 2
    title: "crofty で作った実例"
    params:
      description: "crofty で作った小さな実例 — 著者が所有するドメインに、素の Markdown を。"
    menu:
      main:
        - name: このサイトについて
          url: /ja/about/
          weight: 10
        - name: リンク集
          url: /ja/links/
          weight: 20
        - name: お問い合わせ
          url: /ja/contact/
          weight: 60
