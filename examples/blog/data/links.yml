# Blogroll (03 §A-5): public sites worth reading. One-directional by default —
# linking to a public page needs no permission, and "friends" would over-claim a
# mutuality this list can't verify. Public URLs only, no PII. The note is
# translatable (a {en: …, ja: …} map); name/url/feed are shared across languages.
- name: "Daring Fireball"
  url: "https://daringfireball.net/"
  note:
    en: "John Gruber on Apple, design, and the web."
    ja: "ジョン・グルーバーによる、Apple・デザイン・web の論評。"
  feed: "https://daringfireball.net/feeds/main"
- name: "kottke.org"
  url: "https://kottke.org/"
  note:
    en: "Fine hypertext products since 1998."
    ja: "1998 年から続く、上質なハイパーテキスト。"
- name: "Manuel Moreale"
  url: "https://manuelmoreale.com/"
  note:
    en: "A people-and-blogs corner of the small web."
    ja: "small web の「人とブログ」の一角。"
- name: "Maggie Appleton"
  url: "https://maggieappleton.com/"
  note:
    en: "Essays and drawings on tools for thought."
    ja: "思考の道具をめぐる、随筆とイラスト。"
- name: "Robin Sloan"
  url: "https://www.robinsloan.com/"
  note:
    en: "Notes and dispatches from a writer."
    ja: "ある書き手による、覚書とたより。"
