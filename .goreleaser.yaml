# GoReleaser config for crofty — cross-platform builds + package manifests.
#
#   Local check :  goreleaser check
#   Local build :  goreleaser release --snapshot --clean   (never publishes)
#   Publish     :  git tag vX.Y.Z && GITHUB_TOKEN=$(gh auth token) goreleaser release --clean
# Snapshot mode emits binaries, archives, checksums, and the Scoop/Homebrew
# manifests into dist/ for inspection. A real `goreleaser release` is gated
# behind a git tag and pushes the manifests to the package repos below.
version: 2

project_name: crofty

builds:
  - id: crofty
    main: .
    binary: crofty
    env:
      - CGO_ENABLED=0
    # Inject the git tag into internal/cli.Version so the package version,
    # download URLs, and `crofty version` all derive from one source (the tag).
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/ShiroDoromoto/crofty/internal/cli.Version={{.Version}}
    goos:
      - darwin
      - windows
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: crofty
    # tar.gz everywhere except Windows, which gets a zip (Scoop convention).
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

# Linux distribution — .deb / .rpm built here, then (a) attached to the GitHub
# release for direct download and (b) pushed to a hosted apt/yum repo on Gemfury
# (see the `gemfury:` block below) so Linux users get a managed update path
# (`apt upgrade` / `dnf update`), not just a one-shot dpkg/rpm install.
#   Debian/Ubuntu (repo) :  sudo apt install crofty   (after adding the repo)
#   Fedora/RHEL   (repo) :  sudo dnf install crofty   (after adding the repo)
#   either, direct       :  sudo dpkg -i crofty_*_linux_amd64.deb  /  rpm -i ...
# hugo is NOT a hard dependency: distro hugo is often outdated or the non-extended
# build, so we list it as soft recommends/suggests; `crofty build`/`preview`
# emit a clear "hugo not found on PATH" error if it is missing.
nfpms:
  # id is deliberately distinct from the `crofty` archive id so the `publishers`
  # block below can target ONLY the .deb/.rpm (not the tarballs) when pushing to
  # Gemfury. package_name stays `crofty` — that is the actual installed name.
  - id: linux-packages
    package_name: crofty
    homepage: https://crofty.site
    description: "Own your website: a Markdown-to-published-site pipeline"
    maintainer: "Shiro Doromoto <ShiroDoromoto@users.noreply.github.com>"
    license: AGPL-3.0-or-later
    formats:
      - deb
      - rpm
    recommends:
      - hugo
    suggests:
      - hugo

# Hosted apt/yum repository — push the .deb/.rpm above to Gemfury's free Public
# tier ($0), turning a one-shot `dpkg -i` into a managed `apt upgrade` /
# `dnf update` path for Linux users. The package must be made public once in the
# Gemfury dashboard (uploads default to private); later versions inherit that.
# The free flat repo is served over HTTPS but is UNSIGNED (no Release.gpg, no
# published key), so the install instructions use `[trusted=yes]` / `gpgcheck=0`
# — transport is encrypted, but there is no repo-signature check. We accept that
# (and point integrity-conscious users at the checksummed GitHub release assets)
# rather than self-host a signed repo, whose private GPG key would be a
# bus-factor liability. Verified end-to-end: `apt install crofty` from this repo
# in a clean Ubuntu container installs and runs.
#
# GoReleaser's first-class `gemfury:` block is Pro-only, so on the OSS edition we
# upload via a `publishers` command instead — same result, no subscription. It
# runs once per matching artifact (deb+rpm × amd64+arm64) during the publish
# phase of `goreleaser release` (skipped on --snapshot). FURY_TOKEN is an
# upload-only PUSH token; create it at Gemfury Settings > Tokens. The publish
# step becomes:
#   FURY_TOKEN=… GITHUB_TOKEN=$(gh auth token) goreleaser release --clean
# Note: the rendered curl (token in URL) may appear in verbose release logs;
# the push token is upload-scoped and revocable, so rotate it if that matters.
publishers:
  - name: gemfury
    ids:
      - linux-packages   # only the nfpms .deb/.rpm, never the archive tarballs
    cmd: curl -sSf -F package=@{{ abs .ArtifactPath }} https://{{ .Env.FURY_TOKEN }}@push.fury.io/shirodoromoto/

checksum:
  name_template: checksums.txt

# Windows distribution — Scoop bucket (the Homebrew analog for Windows).
# Hugo is pulled from the main bucket so crofty has its runtime on install,
# matching Homebrew's hugo dependency on macOS.
scoops:
  - name: crofty
    repository:
      owner: ShiroDoromoto
      name: scoop-crofty
    homepage: https://crofty.site
    description: "Own your website: a Markdown-to-published-site pipeline"
    license: AGPL-3.0-or-later
    depends:
      - main/hugo-extended

# macOS/Linux distribution — Homebrew FORMULA (deliberately not a cask). A cask
# quarantines its download, so our unsigned binary trips Gatekeeper ("Apple
# could not verify… malware" popup) on every install; a formula does not
# quarantine, so the unsigned binary runs cleanly with no warning. (The cask
# route would only be warning-free with an Apple Developer ID signature +
# notarization.) Published to the tap ShiroDoromoto/crofty (repo
# homebrew-crofty); install with `brew install ShiroDoromoto/crofty/crofty`.
brews:
  - name: crofty
    repository:
      owner: ShiroDoromoto
      name: homebrew-crofty
    homepage: https://crofty.site
    description: "Own your website: a Markdown-to-published-site pipeline"
    license: AGPL-3.0-or-later
    dependencies:
      - name: hugo
    install: |
      bin.install "crofty"
    test: |
      system bin/"crofty", "version"
