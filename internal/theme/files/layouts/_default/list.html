{{ define "main" }}
<header class="page-header"><h1>{{ .Title }}</h1></header>
{{ with .Content }}<div class="page-intro">{{ . }}</div>{{ end }}
<ul class="post-list">
  {{ range .Pages }}
  <li>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    {{ with .Date }}<time datetime="{{ .Format "2006-01-02" }}">{{ .Format "Jan 2, 2006" }}</time>{{ end }}
  </li>
  {{ end }}
</ul>
{{ end }}
