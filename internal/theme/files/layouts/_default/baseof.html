<!DOCTYPE html>
<html lang="{{ or site.Language.Locale "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>
  {{ partial "crofty/head.html" . }}
  <link rel="stylesheet" href="{{ "css/crofty.css" | relURL }}">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ "/" | relURL }}">{{ site.Title }}</a>
    {{ with site.Menus.main }}
    <nav>{{ range . }}<a href="{{ .URL | relURL }}">{{ .Name }}</a>{{ end }}</nav>
    {{ end }}
  </header>
  <main class="content">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "crofty/footer.html" . }}
  {{- with site.Params.crofty }}{{ with .body_end_raw }}
  {{ . | safeHTML }}
  {{- end }}{{ end }}
</body>
</html>
